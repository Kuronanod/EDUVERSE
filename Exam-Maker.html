<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI สร้างแบบทดสอบ ม.5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="Exam-Maker.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

</head>
<body>

  <nav class="navbar">
  <div class="nav-inner">
    <span class="nav-brand">StudyPlan</span>
    <div class="nav-links">
      <a href="index.html" class="nav-link nav-active">หน้าหลัก</a>
      <a href="AI-Learnbot.html" class="nav-link">แชทบอท</a>
      <a href="Read-Planner.html" class="nav-link">วางแผนการอ่าน</a>
      <a href="Exam-Maker.html" class="nav-link">แบบฝึกหัด</a>
    </div>
  </div>
  </nav>

<div class="page">

  <div class="header">
    <div class="badge">✦ AI-Powered</div>
    <h1>สร้างแบบทดสอบ ม.5</h1>
    <p>เลือกวิชา ตั้งค่า แล้วให้ AI ออกข้อสอบให้อัตโนมัติ<br>พร้อมเฉลยและคำอธิบาย</p>
  </div>

  <!-- API Key Input -->
  <div id="apiKeySection" style="margin-bottom:1.5rem;animation:fadeUp 0.5s ease both">
    <div class="section-label">Anthropic API Key</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." style="
        flex:1; font-family:'Noto Sans Thai',sans-serif; font-size:14px;
        padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-sm);
        background:var(--surface); color:var(--text); outline:none;
        transition:border-color 0.2s;
      " oninput="saveKey(this.value)" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      <span id="keyStatus" style="font-size:12px;color:var(--text3);white-space:nowrap"></span>
    </div>
    <p style="font-size:11px;color:var(--text3);margin-top:6px">
      หา key ได้ที่ <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent2)">console.anthropic.com</a> — เก็บไว้ใน localStorage ของเบราว์เซอร์นี้เท่านั้น
    </p>
  </div>

  <div class="section-label">เลือกวิชา</div>
  <div class="subject-grid">
    <button class="subj-btn" data-subj="คณิตศาสตร์" data-eng="Mathematics grade 11 Thai high school (trigonometry, vectors, statistics, calculus basics)" onclick="selectSubj(this)">
      <span class="subj-icon">📐</span><span class="subj-name">คณิตศาสตร์</span><span class="subj-en">Math</span>
    </button>
    <button class="subj-btn" data-subj="ฟิสิกส์" data-eng="Physics grade 11 Thai high school (waves, optics, electromagnetism)" onclick="selectSubj(this)">
      <span class="subj-icon">⚛️</span><span class="subj-name">ฟิสิกส์</span><span class="subj-en">Physics</span>
    </button>
    <button class="subj-btn" data-subj="เคมี" data-eng="Chemistry grade 11 Thai high school (organic chemistry, equilibrium, electrochemistry)" onclick="selectSubj(this)">
      <span class="subj-icon">🧪</span><span class="subj-name">เคมี</span><span class="subj-en">Chemistry</span>
    </button>
    <button class="subj-btn" data-subj="ชีววิทยา" data-eng="Biology grade 11 Thai high school (genetics, evolution, ecology, human body)" onclick="selectSubj(this)">
      <span class="subj-icon">🧬</span><span class="subj-name">ชีววิทยา</span><span class="subj-en">Biology</span>
    </button>
    <button class="subj-btn" data-subj="ภาษาไทย" data-eng="Thai language grade 11 (literature, grammar, writing, classic texts)" onclick="selectSubj(this)">
      <span class="subj-icon">📖</span><span class="subj-name">ภาษาไทย</span><span class="subj-en">Thai</span>
    </button>
    <button class="subj-btn" data-subj="ภาษาอังกฤษ" data-eng="English language grade 11 Thai curriculum (reading comprehension, grammar, vocabulary)" onclick="selectSubj(this)">
      <span class="subj-icon">🌐</span><span class="subj-name">ภาษาอังกฤษ</span><span class="subj-en">English</span>
    </button>
    <button class="subj-btn" data-subj="สังคมศึกษา" data-eng="Social studies grade 11 Thai curriculum (civics, economics, world religions, geography)" onclick="selectSubj(this)">
      <span class="subj-icon">🌏</span><span class="subj-name">สังคมศึกษา</span><span class="subj-en">Social</span>
    </button>
    <button class="subj-btn" data-subj="ประวัติศาสตร์" data-eng="Thai and world history grade 11 (modern history, Thai kingdoms, WWII, Cold War)" onclick="selectSubj(this)">
      <span class="subj-icon">🏛️</span><span class="subj-name">ประวัติศาสตร์</span><span class="subj-en">History</span>
    </button>
    <button class="subj-btn" data-subj="คอมพิวเตอร์" data-eng="Computer science grade 11 (algorithms, programming, databases, networks)" onclick="selectSubj(this)">
      <span class="subj-icon">💻</span><span class="subj-name">คอมพิวเตอร์</span><span class="subj-en">CS</span>
    </button>
    <button class="subj-btn" data-subj="ศิลปะ" data-eng="Arts grade 11 Thai curriculum (art history, Thai art, visual arts theory)" onclick="selectSubj(this)">
      <span class="subj-icon">🎨</span><span class="subj-name">ศิลปะ</span><span class="subj-en">Arts</span>
    </button>
    <button class="subj-btn" data-subj="สุขศึกษา" data-eng="Health education grade 11 Thai curriculum (nutrition, exercise science, mental health)" onclick="selectSubj(this)">
      <span class="subj-icon">🏃</span><span class="subj-name">สุขศึกษา</span><span class="subj-en">Health</span>
    </button>
    <button class="subj-btn" data-subj="ดนตรี" data-eng="Music grade 11 Thai curriculum (music theory, Thai music, world music)" onclick="selectSubj(this)">
      <span class="subj-icon">🎵</span><span class="subj-name">ดนตรี</span><span class="subj-en">Music</span>
    </button>
  </div>

  <div class="config-row">
    <div class="config-group">
      <label>จำนวนข้อ</label>
      <select id="qCount">
        <option value="5">5 ข้อ</option>
        <option value="10" selected>10 ข้อ</option>
        <option value="15">15 ข้อ</option>
        <option value="20">20 ข้อ</option>
      </select>
    </div>
    <div class="config-group">
      <label>ระดับความยาก</label>
      <select id="difficulty">
        <option value="easy">ง่าย — ความรู้ทั่วไป</option>
        <option value="medium" selected>ปานกลาง — ประยุกต์ใช้</option>
        <option value="hard">ยาก — วิเคราะห์เชิงลึก</option>
      </select>
    </div>
    <div class="config-group">
      <label>รูปแบบคำถาม</label>
      <select id="qStyle">
        <option value="mixed">หลากหลายแบบ</option>
        <option value="theory">ทฤษฎี/ความรู้</option>
        <option value="application">โจทย์คำนวณ</option>
        <option value="scenario">สถานการณ์</option>
      </select>
    </div>
  </div>

  <button class="gen-btn" id="genBtn" onclick="generateQuiz()" disabled>
    <span id="genBtnText">← เลือกวิชาก่อน</span>
  </button>

  <div class="quiz-area" id="quizArea"></div>

</div>

<script>
  // ── API Key ──
  function saveKey(val) {
    localStorage.setItem('anthropic_key', val.trim());
    document.getElementById('keyStatus').textContent = val.trim() ? '✓ บันทึกแล้ว' : '';
  }

  // Load saved key on startup
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('anthropic_key') || '';
    if (saved) {
      document.getElementById('apiKeyInput').value = saved;
      document.getElementById('keyStatus').textContent = '✓ บันทึกแล้ว';
    }
  });

  // ── State ──
  let selectedBtn = null;
  let questions   = [];
  let answered    = 0;
  let correct     = 0;

  // ── Subject selection ──
  function selectSubj(btn) {
    if (selectedBtn) selectedBtn.classList.remove('active');
    selectedBtn = btn;
    btn.classList.add('active');
    const genBtn = document.getElementById('genBtn');
    genBtn.disabled = false;
    document.getElementById('genBtnText').textContent = '✦ สร้างข้อสอบ' + btn.dataset.subj;
  }

  // ── Generate Quiz ──
  async function generateQuiz() {
    if (!selectedBtn) return;

    const subj    = selectedBtn.dataset.subj;
    const subjEng = selectedBtn.dataset.eng;
    const count   = document.getElementById('qCount').value;
    const diff    = document.getElementById('difficulty').value;
    const style   = document.getElementById('qStyle').value;

    const diffMap = {
      easy:   'easy level, basic recall and knowledge',
      medium: 'medium level, application and understanding',
      hard:   'hard level, analysis, synthesis and critical thinking'
    };

    const styleMap = {
      mixed:       'variety of question styles',
      theory:      'theory and conceptual knowledge questions',
      application: 'calculation and problem-solving questions',
      scenario:    'scenario-based situational questions'
    };

    questions = []; answered = 0; correct = 0;

    const genBtn = document.getElementById('genBtn');
    genBtn.disabled = true;
    document.getElementById('genBtnText').textContent = 'กำลังสร้าง...';
    document.getElementById('quizArea').innerHTML = `
      <div class="loading-msg">
        <div class="loader">
          <div class="dots"><span></span><span></span><span></span></div>
          <span>AI กำลังออกข้อสอบ${subj}...</span>
        </div>
      </div>`;

    const prompt = `You are an expert Thai high school quiz creator for grade 11 (มัธยมศึกษาปีที่ 5) students.

Create exactly ${count} multiple choice questions about: ${subjEng}
Difficulty: ${diffMap[diff]}
Style: ${styleMap[style]}

IMPORTANT RULES:
- ALL questions and choices must be in Thai language
- Each question must have exactly 4 choices labeled ก. ข. ค. ง.
- Questions must be accurate and appropriate for Thai ม.5 curriculum
- Make all 4 choices plausible (avoid obviously wrong answers)
- Explanations should be educational and concise (1-2 sentences)

Return ONLY a valid JSON array with NO markdown, NO backticks, NO extra text:
[
  {
    "q": "คำถามภาษาไทย?",
    "choices": ["ก. ตัวเลือกที่หนึ่ง", "ข. ตัวเลือกที่สอง", "ค. ตัวเลือกที่สาม", "ง. ตัวเลือกที่สี่"],
    "answer": 0,
    "explain": "คำอธิบายสั้นๆ ว่าทำไมข้อนี้ถูก"
  }
]
"answer" is the 0-indexed position of the correct choice.`;

    const apiKey = localStorage.getItem('anthropic_key') || '';
    if (!apiKey) {
      document.getElementById('quizArea').innerHTML = `
        <div class="error-msg">⚠️ กรุณาใส่ Anthropic API Key ก่อนนะ</div>`;
      genBtn.disabled = false;
      document.getElementById('genBtnText').textContent = '✦ สร้างข้อสอบ' + subj;
      return;
    }

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const data = await resp.json();
      let raw = data.content.map(b => b.text || '').join('');
      raw = raw.replace(/```json|```/g, '').trim();
      const start = raw.indexOf('['), end = raw.lastIndexOf(']');
      if (start === -1 || end === -1) throw new Error('Invalid JSON response');
      questions = JSON.parse(raw.substring(start, end + 1));
      renderQuiz(subj);

    } catch (e) {
      document.getElementById('quizArea').innerHTML = `
        <div class="error-msg">
          ⚠️ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง<br>
          <small style="color:var(--text3);margin-top:6px;display:block">${e.message}</small>
        </div>`;
    }

    genBtn.disabled = false;
    document.getElementById('genBtnText').textContent = '↺ ออกข้อสอบใหม่ ' + subj;
  }

  // ── Render Questions ──
  function renderQuiz(subj) {
    const total = questions.length;
    const area  = document.getElementById('quizArea');

    let html = `
      <div class="score-bar">
        <div class="score-info">
          <div class="score-subject">วิชา${subj}</div>
          <div class="score-nums"><span id="scoreCorrect">0</span> / ${total} ข้อ</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <button class="retry-btn" onclick="generateQuiz()">↺ ออกใหม่</button>
      </div>`;

    questions.forEach((q, i) => {
      html += `
        <div class="q-card" style="animation-delay:${i * 0.05}s">
          <div class="q-header"><span class="q-num-badge">ข้อ ${i + 1}</span></div>
          <div class="q-text">${q.q}</div>
          <div class="choices" id="choices${i}">
            ${q.choices.map((c, ci) => `<button class="choice" onclick="answer(${i},${ci})">${c}</button>`).join('')}
          </div>
          <div class="explain" id="exp${i}"><span class="explain-icon">💡 </span>${q.explain}</div>
        </div>`;
    });

    area.innerHTML = html;
  }

  // ── Handle Answer ──
  function answer(qi, ci) {
    const q    = questions[qi];
    const btns = document.querySelectorAll(`#choices${qi} .choice`);
    btns.forEach(b => b.disabled = true);

    if (ci === q.answer) {
      btns[ci].classList.add('correct');
      correct++;
    } else {
      btns[ci].classList.add('wrong');
      btns[q.answer].classList.add('show-correct');
    }

    document.getElementById(`exp${qi}`).style.display = 'block';
    answered++;
    document.getElementById('scoreCorrect').textContent = correct;
    document.getElementById('progressBar').style.width = (answered / questions.length * 100) + '%';

    if (answered === questions.length) setTimeout(showResult, 400);
  }

  // ── Show Final Result ──
  function showResult() {
    const pct = Math.round(correct / questions.length * 100);
    const map = [
      [80, '🏆', 'ยอดเยี่ยมมาก!'],
      [60, '👍', 'ทำได้ดี ลองพัฒนาอีกนิด'],
      [40, '📚', 'ต้องทบทวนเพิ่มเติมนะ'],
      [0,  '💪', 'สู้ๆ อย่าท้อ!']
    ];
    const [, emoji, msg] = map.find(([min]) => pct >= min);

    const banner = document.createElement('div');
    banner.className = 'result-banner';
    banner.innerHTML = `
      <span class="result-emoji">${emoji}</span>
      <div class="result-title">${correct} / ${questions.length} ข้อ (${pct}%)</div>
      <div class="result-sub">${msg}</div>`;

    const area = document.getElementById('quizArea');
    area.querySelector('.score-bar').insertAdjacentElement('afterend', banner);
    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
</script>
</body>
</html>
