<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDUVERSE AI Chat</title>
<link rel="stylesheet" href="AI-Learnbot.css">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
 
<nav class="navbar">
  <div class="nav-inner">
    <span class="nav-brand">StudyPlan</span>
    <div class="nav-links">
      <a href="index.html" class="nav-link nav-active">หน้าหลัก</a>
      <a href="AI-Learnbot.html" class="nav-link">แชทบอท</a>
      <a href="Read-Planner.html" class="nav-link">วางแผนการอ่าน</a>
      <a href="Exam-Maker.html" class="nav-link">แบบฝึกหัด</a>
    </div>
  </div>
</nav>
 
<div class="app">
  <h1>EDUVERSE AI Assistant</h1>
 
  <div class="chat-container">
    <div class="chat-box" id="chat-box">
      <div class="message ai">
        สวัสดีครับ! ผมคือ AI ผู้ช่วยด้านการเรียนของคุณ ถามได้เลยครับ ไม่ว่าจะเป็นการอธิบายเนื้อหา ช่วยทำโจทย์ หรือวางแผนการอ่านหนังสือ
      </div>
    </div>
 
    <div class="input-area">
      <input id="user-input" placeholder="พิมพ์คำถามของคุณ...">
      <button id="send-btn" onclick="sendMessage()">ส่ง</button>
    </div>
  </div>
 
 
</div>
 
<script>
const SYSTEM_PROMPT = `คุณคือผู้ช่วย AI ด้านการศึกษาชื่อ EDUVERSE คุณเชี่ยวชาญในการช่วยนักเรียนและนักศึกษาเรื่องต่าง ๆ ดังนี้:
- อธิบายเนื้อหาวิชาต่าง ๆ เช่น คณิตศาสตร์ ฟิสิกส์ เคมี ชีววิทยา ภาษาอังกฤษ ประวัติศาสตร์ ฯลฯ
- ช่วยแก้โจทย์และอธิบายวิธีคิดทีละขั้นตอน
- แนะนำเทคนิคการเรียน การจำ และการทบทวนบทเรียน
- ช่วยวางแผนการอ่านหนังสือและเตรียมสอบ
- สรุปเนื้อหาที่ซับซ้อนให้เข้าใจง่าย
 
ตอบเป็นภาษาไทยเสมอ ยกเว้นเมื่อผู้ใช้ถามเป็นภาษาอื่น ใช้ภาษาที่เป็นมิตรและกระชับ หากเป็นโจทย์คณิตศาสตร์หรือวิทยาศาสตร์ ให้แสดงขั้นตอนการคิดอย่างละเอียด`;
 
// สมัครรับ API Key ฟรีได้ที่ https://aistudio.google.com (ใช้ personal Gmail นะครับ)
const API_KEY = "AIzaSyAvgnqZGkr-cKJJz9lkDfbK4FoSgj3K-Jc";
const MODEL = "gemini-2.5-flash";
 
let conversationHistory = [];
 
function appendMessage(role, text) {
  const chat = document.getElementById("chat-box");
  const div = document.createElement("div");
  div.className = `message ${role}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}
 
function setLoading(on) {
  const btn   = document.getElementById("send-btn");
  const input = document.getElementById("user-input");
  btn.disabled   = on;
  input.disabled = on;
  btn.textContent = on ? "..." : "ส่ง";
}
 
async function sendMessage() {
  const input = document.getElementById("user-input");
  const text  = input.value.trim();
  if (!text) return;
 
  if (!API_KEY || API_KEY === "YOUR_GEMINI_API_KEY_HERE") {
    appendMessage("ai", "⚠️ กรุณาใส่ Gemini API Key ในโค้ดก่อนนะครับ (ตัวแปร API_KEY)");
    return;
  }
 
  appendMessage("user", text);
  input.value = "";
  conversationHistory.push({ role: "user", parts: [{ text }] });
 
  setLoading(true);
  const loadingDiv = appendMessage("ai", "กำลังคิด...");
 
  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: conversationHistory
        })
      }
    );
 
    const data = await response.json();
 
    if (!response.ok) {
      const errMsg = data?.error?.message || "เกิดข้อผิดพลาด กรุณาตรวจสอบ API Key";
      loadingDiv.textContent = "⚠️ " + errMsg;
      conversationHistory.pop();
    } else {
      const reply = data.candidates[0].content.parts[0].text;
      loadingDiv.textContent = reply;
      conversationHistory.push({ role: "model", parts: [{ text: reply }] });
    }
  } catch (err) {
    loadingDiv.textContent = "⚠️ ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่อีกครั้ง";
    conversationHistory.pop();
  }
 
  setLoading(false);
  document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
}
 
document.getElementById("user-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) sendMessage();
});
</script>
 
</body>
</html>
